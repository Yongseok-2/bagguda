<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바꾸다</title>
    <link rel="stylesheet" href="../styles.css">    
    <link rel="stylesheet" href="../css/item.css">
</head>
<body style="overflow-x: hidden">


    <!--상단-->
    <header class="header">
        <img src="../images/top_banner.svg" alt="맨위 로고" class="top-bar">
        <div class="search-bar">
            <a href="../index.html"><img src="../images/main_logo.svg" alt="로고" class="logo"></a>
            <form id="searchForm" action="search_result.html" method="GET">
                <div class="search-input-container">
                    <input type="text" placeholder="🔍 물품명, 장터명, 카테고리 태그 등" class="search-input" id="searchInput" name="query">
                    <button type="submit" class="search-button" id="searchButton">🔍</button>
                </div>
            </form>
                <div class="icons">
                    <a href="../html/bookmark.html"><span><img src="../images/bookmark01.png" alt="북마크" class="icons"></span></a>
                    <span><img src="../images/favorite01.png" alt="즐겨찾기" class="icons"></span>
                    <a href="../html/my_interface.html"><span><img src="../images/interpace01.png" alt="내정보" class="icons"></span></a>
                    <a href="../html/login.html"><input type="button" class="icons" value="로그인"/></a>
                </div>
            </div>
        </div>
        <nav class="manu-bar">
            <button class="category-btn">카테고리</button>
            <a href="../index.html#my-wants">내가 원해요</a>
            <a href="../index.html#others-wants">상대방이 원해요</a>     
            <a href="#">급상승</a>
            <a href="#">쏙</a>
            <a href="#">이벤트</a>
            <a href="item.html">상품등록</a>
        </nav>
    </header>

    <!-- 상품 등록 폼 (항상 보이도록 설정) -->
    <main>
        
        <div class="item-interface-container">
            <h2>물품 정보</h2>
            <div class="item-img">
                <span id="image-count">물품 이미지(0/10)</span>
                <div class="photo-upload-container">
                    <div class="upload-box" id="custom-upload-box">이미지 등록</div>
                    <input type="file" id="photo-input" accept="image/*" multiple hidden>
                </div>
                <div id="photo-preview"></div>
            </div>
            <div class="item-input-container">
                <span id="image-count">물품명</span>
                <input type="text" placeholder=" 물품명을 입력해주세요" class="item-input">
            </div>
            <div class="item-cartegory-container">
                <span id="image-count">카테고리</span>
                <select class="item-cartegory">
                    <option value="" disabled selected>선택</option>
                    <option value="category1">카테고리 1</option>
                    <option value="category2">카테고리 2</option>
                    <option value="category3">카테고리 3</option>
                </select>
                <span class="separator"> > </span> <!-- 선택들 사이에 > 기호 추가 -->
                <select class="item-cartegory">
                    <option value="" disabled selected>선택</option>
                    <option value="category1">카테고리 1</option>
                    <option value="category2">카테고리 2</option>
                    <option value="category3">카테고리 3</option>
                </select>
            </div>
            <div class="item-trade-container">
                <div class="trade-method"> 
                    <span id="image-count">거래방식</span>
                    <input type="checkbox">
                    
                </div>
                <div class="trade-price">
                    <span id="image-count">가격</span>
                </div>
                <div trade-cartegory>
                    <span id="image-count">교환 원하는 카테고리</span>
                </div>
                
                
            </div>
            
        </div>

    </main>
    <div style="flex: 0 0 auto;">
        <div class="container" id="stickyContainer">
            <button type="button" value="Top" onclick="clickme()" style="width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 5px; background: white; border: 1px solid #0880F8;">Top</button>
            <div class="heart-container">
                <div class="heart">❤️</div>
                <span class="heart-count">2</span> <!-- 하트 받은 개수 -->
            </div>
            <hr class="divider"> <!-- 구분선-->
            
            <div class="recent-viewed">최근 본 상품</div>
            <ul id="recentViewedList"></ul> <!-- 최근 본 상품 목록 -->
            <ul id="delete-btn"></ul>
            <!-- 전체 삭제 버튼 -->
        </div>
    </div>
    <script src="../scripts.js"></script>
    <script src="../js/itemscripts.js"></script>
</body>
</html>
