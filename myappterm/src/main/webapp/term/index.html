<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바꾸다</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="overflow-x: hidden"></body>
<body>
    
    <!--상단-->
    <header class="header">
        <img src="images/top_banner.svg" alt="맨위 로고" class="top-bar">
        <div class="search-bar">
            <a href="index.html"><img src="images/main_logo.svg" alt="로고" class="logo"></a>
            <form id="searchForm" action="html/search_result.html" method="GET">
                <div class="search-input-container">
                    <input type="text" placeholder="🔍 물품명, 장터명, 카테고리 태그 등" class="search-input" id="searchInput" name="query">
                    <button type="submit" class="search-button" id="searchButton">🔍</button>
                </div>
            </form>
                <div class="icons">
                    <a href="html/bookmark.html"><span><img src="images/bookmark01.png" alt="북마크" class="icons"></span></a>
                    <span><img src="images/favorite01.png" alt="즐겨찾기" class="icons"></span>
                    <a href="html/my_interface.jsp"><span><img src="images/interpace01.png" alt="내정보" class="icons"></span></a>
                    <a href="html/login.html"><input type="button" class="icons" value="로그인"/></a>
                </div>
            </div>
        </div>
        <nav class="manu-bar">
            <button class="category-btn">카테고리</button>
            <a href="index.html#my-wants">내가 원해요</a>
            <a href="index.html#others-wants">상대방이 원해요</a>     
            <a href="#">급상승</a>
            <a href="#">쏙</a>
            <a href="#">이벤트</a>
            <a href="html/item.html">상품등록</a>
        </nav>
    </header>
    <div class="banner">
        <img src="images/main_banner1.svg" alt="배너" class="banner" style="object-fit: cover;">
    </div>

    
    
    <div style="display: flex;">
        <div style="flex: 1;">
            <main class="main">
                <h2 id="my-wants">내가 원해요</h2><br>
                <section class="my-wants">
                    <div class="wants-container">
                        <div class="want-item">
                            <img src="images/ad-image-1.png" alt="상품 이미지" class="product-image">
                            <h5 class="product-name">상품 1</h5>
                            <p class="product-price">₩30,000</p>
                            <a href="#" class="trade-button">거래하기</a>
                        </div>
                        <div class="want-item">
                            <img src="images/bicycle01.png" alt="상품 이미지" class="product-image">
                            <h5 class="product-name">상품 2</h5>
                            <p class="product-price">₩50,000</p>
                            <a href="#" class="trade-button">거래하기</a>
                        </div>
                        <!-- 추가 상품도 동일 구조로 작성 -->
                    </div>
                </section>
                <br>
                <h2 id="others-wants">상대방이 원해요</h2><br>
                <section class="others-wants">
                    <div class="wants-container">
                        <div class="want-item">
                            <img src="https://dummyimage.com/150x100/dee2e6/6c757d.jpg" alt="상품 이미지" class="product-image">
                            <h5 class="product-name">상품 A</h5>
                            <p class="product-price">₩25,000</p>
                            <a href="#" class="trade-button">거래하기</a>
                        </div>
                        <div class="want-item">
                            <img src="https://dummyimage.com/150x100/dee2e6/6c757d.jpg" alt="상품 이미지" class="product-image">
                            <h5 class="product-name">상품 B</h5>
                            <p class="product-price">₩45,000</p>
                            <a href="#" class="trade-button">거래하기</a>
                        </div>
                        <div class="want-item">
                            <img src="https://dummyimage.com/150x100/dee2e6/6c757d.jpg" alt="상품 이미지" class="product-image">
                            <h5 class="product-name">상품 C</h5>
                            <p class="product-price">₩45,000</p>
                            <a href="#" class="trade-button">거래하기</a>
                        </div>
                        <div class="want-item">
                            <img src="https://dummyimage.com/150x100/dee2e6/6c757d.jpg" alt="상품 이미지" class="product-image">
                            <h5 class="product-name">상품 D</h5>
                            <p class="product-price">₩45,000</p>
                            <a href="#" class="trade-button">거래하기</a>
                        </div>
                    </div>
                </section>
            </main>
        </div>
        
        <!-- 오른쪽바 -->

    </div>
    <div style="flex: 0 0 auto;">
        <div class="container" id="stickyContainer">
            <button type="button" value="Top" onclick="clickme()" style="width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 5px; background: white; border: 1px solid #0880F8;">Top</button>
            <div class="heart-container">
                <div class="heart">❤️</div>
                <span class="heart-count">2</span> <!-- 하트 받은 개수 -->
            </div>
            <hr class="divider"> <!-- 구분선-->
            
            <div class="recent-viewed">최근 본 상품</div>
            <ul id="recentViewedList"></ul> <!-- 최근 본 상품 목록 -->
            <ul id="delete-btn"></ul>
            <!-- 전체 삭제 버튼 -->
        </div>
    </div>


    <script src="scripts.js"></script>
</body>
</html>
